version: '3.9'

# CallisTrack – uses Supabase as DB (no local postgres container needed)
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: callistrack_api
    restart: unless-stopped
    env_file: ./backend/.env
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: callistrack_web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
